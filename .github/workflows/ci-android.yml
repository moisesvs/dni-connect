name: CI - Build Android

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/flutter/**'
      - 'packages/core/**'
      - '.github/workflows/ci-android.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/flutter/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'

env:
  FLUTTER_VERSION: '3.24.0'
  JDK_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # Core Package Testing
  core-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core
        continue-on-error: true

      - name: Run tests
        run: npm test --workspace=packages/core --if-present
        continue-on-error: true

  # Flutter Android Build
  flutter-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get Flutter dependencies
        working-directory: apps/flutter
        run: flutter pub get

      - name: Create Android native project if missing
        working-directory: apps/flutter
        run: |
          if [ ! -d "android" ]; then
            echo "Generating Android native project structure..."
            flutter create --platforms android .
          else
            echo "Android native project already exists"
          fi

      - name: Analyze Flutter code
        working-directory: apps/flutter
        run: flutter analyze
        continue-on-error: true

      - name: Check Flutter format
        working-directory: apps/flutter
        run: flutter format --set-exit-if-changed .
        continue-on-error: true

      - name: Build Flutter APK
        working-directory: apps/flutter
        run: flutter build apk --release
        env:
          JAVA_TOOL_OPTIONS: -Xmx4096m

      - name: Build Flutter App Bundle (AAB)
        working-directory: apps/flutter
        run: flutter build appbundle --release
        env:
          JAVA_TOOL_OPTIONS: -Xmx4096m

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-apk
          path: apps/flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-aab
          path: apps/flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  # Summary
  android-build-summary:
    runs-on: ubuntu-latest
    needs: [core-package, flutter-android]
    if: always()

    steps:
      - name: Check Android build status
        run: |
          echo "=== Android Build Summary ==="
          echo "Core Package: ${{ needs.core-package.result }}"
          echo "Flutter Android: ${{ needs.flutter-android.result }}"
          
          if [ "${{ needs.flutter-android.result }}" != "success" ]; then
            echo "❌ Flutter Android build failed"
            exit 1
          else
            echo "✅ Android build successful"
          fi
        continue-on-error: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: |
          echo "=== Build Artifacts ==="
          find artifacts -type f -exec ls -lh {} \;
        continue-on-error: true
