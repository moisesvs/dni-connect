name: CI - Build Web

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/flutter/**'
      - 'apps/web/backend/**'
      - 'packages/core/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/flutter/**'
      - 'apps/web/backend/**'
      - 'packages/core/**'

env:
  FLUTTER_VERSION: '3.24.0'
  NODE_VERSION: '18'

jobs:
  # Backend Testing & Building
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'apps/web/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build backend
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

      - name: Upload backend artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: apps/web/backend/dist
          retention-days: 7

  # Core Package Testing
  core-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'packages/core/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

  # Flutter Web Build
  flutter-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Format check
        run: flutter format --set-exit-if-changed .
        continue-on-error: true

      - name: Build web
        run: flutter build web --release

      - name: Upload Flutter web artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: flutter-web-build
          path: apps/flutter/build/web
          retention-days: 7

  # Summary
  web-build-summary:
    runs-on: ubuntu-latest
    needs: [backend, core-package, flutter-web]
    if: always()

    steps:
      - name: Check web build status
        run: |
          echo "=== Web Build Summary ==="
          echo "Backend: ${{ needs.backend.result }}"
          echo "Core Package: ${{ needs.core-package.result }}"
          echo "Flutter Web: ${{ needs.flutter-web.result }}"
          
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.core-package.result }}" != "success" ] || \
             [ "${{ needs.flutter-web.result }}" != "success" ]; then
            echo "❌ Web build failed"
            exit 1
          else
            echo "✅ Web build successful"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Build Artifacts ==="
          find artifacts -type f -exec ls -lh {} \;
